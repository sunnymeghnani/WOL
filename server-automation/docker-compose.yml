services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server-automation-webui

    # Port mapping — works on Docker Desktop (Windows/macOS).
    # TRADE-OFF: WOL UDP broadcasts from inside the container will NOT reach
    # the LAN's 192.168.x.255 broadcast domain. For WOL, run the Python
    # script directly on the host instead, or switch to network_mode: host
    # when deploying on a Linux host.
    ports:
      - "5000:5000"

    volumes:
      # Server inventory — mounted read-only.
      # Edits on the HOST reflect inside the container immediately because
      # app.py re-reads the YAML on every request. No restart needed.
      - ./config:/app/config:ro

      # Logs persist on the host so you can grep them after a `compose down`
      - ./logs:/app/logs

      # SSH key for shutdown commands — mounted read-only.
      # On Windows, replace ${HOME} with C:\Users\YourName or use an env var.
      - ${HOME}/.ssh/server_automation_key:/root/.ssh/server_automation_key:ro

    # Restart on crash, and on host reboot if Docker is set to start at boot
    restart: unless-stopped

    # Healthcheck so `docker ps` shows a useful status
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/activity')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
